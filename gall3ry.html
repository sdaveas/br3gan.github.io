<script>
var imgs=document.querySelectorAll('#gallery img'),cur=-1;
function show(i){if(cur>=0)imgs[cur].classList.remove('zoom');cur=(i+imgs.length)%imgs.length;imgs[cur].classList.add('zoom')}
imgs.forEach(function(img,i){img.onclick=function(){if(img.classList.contains('zoom')){img.classList.remove('zoom');cur=-1}else show(i)}});
document.onkeydown=function(e){if(cur<0)return;if(e.key==='ArrowLeft')show(cur-1);if(e.key==='ArrowRight')show(cur+1);if(e.key==='Escape'){imgs[cur].classList.remove('zoom');cur=-1}};
</script>
